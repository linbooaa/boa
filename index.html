<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>入稿格式整理工具</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f6efd9;
    --panel: #fffdf5;
    --text: #3a3120;
    --muted: #8a7a55;
    --accent: #d1a020;
    --accent-ink: #a67816;
    --border: #e6d9ad;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #221f10;
      --panel: #2c2815;
      --text: #f1e9d0;
      --muted: #c2b48c;
      --accent: #e8b93a;
      --accent-ink: #f5cf6b;
      --border: #4a4326;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Noto Serif TC", "PMingLiU", Georgia, "Segoe UI", "Microsoft JhengHei", serif;
    background:
      radial-gradient(circle at 15% 0%, color-mix(in srgb, var(--accent) 6%, transparent), transparent 45%),
      var(--bg);
    color: var(--text);
  }
  .page {
    max-width: 1040px;
    margin: 0 auto;
    padding: 56px 24px 64px;
  }
  header { margin-bottom: 32px; }
  .kicker {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent-ink);
    margin: 0 0 10px;
  }
  h1 {
    font-size: 30px;
    margin: 0 0 10px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .rule {
    width: 56px;
    height: 3px;
    background: var(--accent);
    border-radius: 2px;
    margin: 0 0 16px;
  }
  p.sub { color: var(--muted); margin: 0; font-size: 14.5px; line-height: 1.8; max-width: 46em; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 28px 24px;
    box-shadow: 0 14px 32px -18px rgba(60, 40, 20, 0.28), 0 1px 2px rgba(60, 40, 20, 0.05);
  }
  .options {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 22px;
    background: color-mix(in srgb, var(--accent) 5%, var(--bg));
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 20px;
    margin: 0 0 22px;
    font-size: 14px;
  }
  .options label { display: flex; align-items: center; gap: 7px; cursor: pointer; }
  .options input[type="checkbox"] { accent-color: var(--accent); width: 15px; height: 15px; }
  .options select {
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 6px;
  }
  .hint {
    display: none;
    font-size: 13px;
    color: var(--accent-ink);
    background: color-mix(in srgb, var(--accent) 10%, var(--panel));
    border: 1px solid color-mix(in srgb, var(--accent) 30%, var(--border));
    border-radius: 10px;
    padding: 10px 14px;
    margin: -6px 0 18px;
    line-height: 1.7;
  }
  .hint.show { display: block; }
  .grid {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: stretch;
    gap: 20px;
  }
  .arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    align-self: center;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: color-mix(in srgb, var(--accent) 14%, var(--panel));
    color: var(--accent-ink);
    font-size: 15px;
  }
  @media (max-width: 800px) {
    .grid { grid-template-columns: 1fr; }
    .arrow { display: none; }
    .page { padding: 32px 16px 48px; }
    .card { padding: 20px 18px 18px; }
  }
  .col h2 {
    font-size: 13px;
    margin: 0 0 10px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  textarea {
    width: 100%;
    height: 420px;
    resize: vertical;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    font-size: 15.5px;
    line-height: 1.9;
    font-family: inherit;
    box-shadow: inset 0 1px 3px rgba(60, 40, 20, 0.05);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: inset 0 1px 3px rgba(60, 40, 20, 0.05), 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent);
  }
  .emoji-panel { margin: 20px 0 0; }
  .emoji-panel h2 {
    font-size: 13px;
    margin: 0 0 10px;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .emoji-grid {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    background: color-mix(in srgb, var(--accent) 5%, var(--bg));
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    max-height: 220px;
    overflow-y: auto;
  }
  .emoji-cat {
    flex-basis: 100%;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 6px 0 0;
  }
  .emoji-cat:first-child { margin-top: 0; }
  .emoji-btn {
    border: 1px solid transparent;
    background: transparent;
    border-radius: 8px;
    font-size: 19px;
    line-height: 1;
    padding: 6px 8px;
    cursor: pointer;
    transition: background 0.12s ease, transform 0.1s ease;
  }
  .emoji-btn:hover { background: var(--panel); border-color: var(--border); }
  .emoji-btn:active { transform: scale(0.92); }
  .actions {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0;
  }
  button {
    border: none;
    border-radius: 999px;
    padding: 11px 26px;
    font-size: 14.5px;
    cursor: pointer;
    font-weight: 600;
    font-family: inherit;
    letter-spacing: 0.02em;
    transition: transform 0.1s ease, box-shadow 0.15s ease, opacity 0.15s ease;
  }
  button:active { transform: scale(0.97); }
  #convertBtn {
    background: var(--accent);
    color: #fff9f2;
    box-shadow: 0 2px 8px color-mix(in srgb, var(--accent-ink) 45%, transparent);
  }
  #convertBtn:hover { background: var(--accent-ink); }
  #copyBtn { background: var(--panel); color: var(--text); border: 1px solid var(--border); }
  #copyBtn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent-ink); }
  #copyBtn:disabled { opacity: 0.45; cursor: default; }
  #clearBtn { background: transparent; color: var(--muted); border: 1px solid transparent; }
  #clearBtn:hover { color: var(--accent-ink); border-color: var(--border); }
  .status { font-size: 13px; color: var(--muted); margin-left: 4px; }
  footer {
    margin-top: 40px;
    text-align: center;
    font-size: 12.5px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  footer .sig {
    font-style: italic;
    color: var(--accent-ink);
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="page">

<header>
  <p class="kicker">Manuscript Studio</p>
  <h1>入稿格式整理工具</h1>
  <div class="rule"></div>
  <p class="sub">貼上原始稿件,一鍵統一標點全半形、中英文間距與多餘空白。</p>
</header>

<section class="card">

<div class="options">
  <label><input type="checkbox" id="optPunct" checked> 標點符號轉全形(, . ! ? ; : ( ) " ' → 全形)</label>
  <label><input type="checkbox" id="optSpacing" checked> 中文與英文/數字之間自動加空格</label>
  <label><input type="checkbox" id="optWhitespace" checked> 整理多餘空白與換行</label>
  <label><input type="checkbox" id="optSocial"> 社群文案模式(句尾移除逗號/句號,保留驚嘆號、問號)</label>
  <label>建議斷行:
    <select id="platformSelect">
      <option value="">不斷行(依原文)</option>
      <option value="18">Instagram(約 18 字/行)</option>
      <option value="24">Facebook / Threads(約 24 字/行)</option>
      <option value="14">LINE 官方帳號(約 14 字/行)</option>
    </select>
  </label>
</div>

<div class="grid">
  <div class="col">
    <h2>原始文字</h2>
    <textarea id="input" placeholder="在這裡貼上稿件原文..."></textarea>
  </div>
  <div class="arrow">→</div>
  <div class="col">
    <h2>整理後結果</h2>
    <textarea id="output" placeholder="按下「開始轉換」後會顯示在這裡"></textarea>
  </div>
</div>

<div class="emoji-panel">
  <h2>常用 Emoji(點擊插入到游標所在欄位)</h2>
  <div class="emoji-grid" id="emojiGrid"></div>
</div>

<div class="actions">
  <button id="convertBtn">✎ 開始轉換</button>
  <button id="copyBtn" disabled>⧉ 複製結果</button>
  <button id="clearBtn">🗑 清除內容</button>
  <span class="status" id="status"></span>
</div>

<p class="hint" id="socialHint">📌 小提醒:適度加入 emoji 能增加文案趣味與互動感;正式發布前,社群仍保有依平台屬性調整文字/文案的權利。</p>

</section>

<footer>Made with care by <span class="sig">Boa Lin</span></footer>

</div>

<script>
(function () {
  const CJK = '一-鿿㐀-䶿豈-﫿぀-ヿ가-힣';
  const cjkRe = new RegExp('[' + CJK + ']');

  // 半形 -> 全形 標點對照表
  const PUNCT_MAP = {
    '!': '！',
    '?': '？',
    ';': '；',
    ',': '，',
    '(': '（',
    ')': '）',
    '~': '～'
  };

  function normalizeWhitespace(text) {
    text = text.replace(/\r\n?/g, '\n');
    // 每行去除行尾空白
    text = text.split('\n').map(line => line.replace(/[ \t]+$/g, '')).join('\n');
    // 連續半形空白/tab 收成一個空白(保留全形空白　,常用於段落縮排)
    text = text.replace(/[ \t]{2,}/g, ' ');
    // 三個以上換行收成兩個(最多留一行空行)
    text = text.replace(/\n{3,}/g, '\n\n');
    return text.trim();
  }

  function normalizePunctuation(text) {
    // 先處理刪節號 ... -> ……
    text = text.replace(/\.{3,}/g, '……');

    // 句號:排除數字/英數字前後相鄰(小數點、網址、檔名、縮寫等)
    text = text.replace(/(?<![A-Za-z0-9])\.(?![A-Za-z0-9])/g, '。');

    // 冒號:排除時間格式 12:30 這類數字間的冒號
    text = text.replace(/(?<!\d):(?!\d)/g, '：');

    // 逗號:排除千分位數字之間,例如 1,000
    text = text.replace(/(?<!\d),(?!\d)/g, PUNCT_MAP[',']);

    // 其餘簡單對照表符號
    text = text.replace(/[!?;()~]/g, ch => PUNCT_MAP[ch] || ch);

    // 直雙引號 -> 中文引號「」(依出現順序交替開/合)
    let dq = 0;
    text = text.replace(/"/g, () => (dq++ % 2 === 0 ? '「' : '」'));

    // 直單引號 -> 中文單引號『』(依出現順序交替開/合)
    let sq = 0;
    text = text.replace(/'/g, () => (sq++ % 2 === 0 ? '『' : '』'));

    return text;
  }

  function addCjkSpacing(text) {
    const cjk = '[' + CJK + ']';
    const alnum = '[A-Za-z0-9]';
    text = text.replace(new RegExp('(' + cjk + ')(' + alnum + ')', 'g'), '$1 $2');
    text = text.replace(new RegExp('(' + alnum + ')(' + cjk + ')', 'g'), '$1 $2');
    // 避免全形標點前後被誤加空白
    text = text.replace(/([A-Za-z0-9]) (?=[　-〿＀-￯])/g, '$1');
    text = text.replace(/(?<=[　-〿＀-￯]) ([A-Za-z0-9])/g, '$1');
    return text;
  }

  function stripSentenceEndPunctuation(text) {
    // 社群文案:句尾的逗號/句號通常可省略,但驚嘆號、問號保留語氣
    return text.split('\n').map(line => line.replace(/[,，.。]+$/g, '')).join('\n');
  }

  function wrapByPlatform(text, maxChars) {
    if (!maxChars) return text;
    const breakChars = '，。！？、,.!?; ';
    return text.split('\n').map(line => {
      if (line.length <= maxChars) return line;
      const result = [];
      let start = 0;
      while (start < line.length) {
        let end = Math.min(start + maxChars, line.length);
        if (end < line.length) {
          let bestBreak = -1;
          for (let i = end; i > start; i--) {
            if (breakChars.includes(line[i - 1])) { bestBreak = i; break; }
          }
          if (bestBreak > start) end = bestBreak;
        }
        result.push(line.slice(start, end).trim());
        start = end;
      }
      return result.join('\n');
    }).join('\n');
  }

  function convert() {
    let text = document.getElementById('input').value;
    const doWhitespace = document.getElementById('optWhitespace').checked;
    const doPunct = document.getElementById('optPunct').checked;
    const doSpacing = document.getElementById('optSpacing').checked;
    const doSocial = document.getElementById('optSocial').checked;
    const platformChars = parseInt(document.getElementById('platformSelect').value, 10) || 0;

    if (doWhitespace) text = normalizeWhitespace(text);
    if (doPunct) text = normalizePunctuation(text);
    if (doSocial) text = stripSentenceEndPunctuation(text);
    if (doSpacing) text = addCjkSpacing(text);
    if (doWhitespace) text = text.replace(/[ \t]{2,}/g, ' ');
    if (platformChars) text = wrapByPlatform(text, platformChars);

    document.getElementById('output').value = text;
    document.getElementById('copyBtn').disabled = text.length === 0;
    document.getElementById('status').textContent = '完成,共 ' + text.length + ' 字';
    document.getElementById('socialHint').classList.toggle('show', doSocial);
  }

  const EMOJI_GROUPS = [
    { label: '商用 / 行銷', items: ['🆕','🆓','🆒','🔒','🔓','🔑','⏳','⌛','📅','🗓️','📊','📈','📉','💼','🏢','🛒','🧾','💳','💸','🤑','📦','🚚','🚀','👑','💎','🥈','🥉','🏅','🎖️','☑️','✔️','🧧','🎫','🏬','🏦'] },
    { label: '表情', items: ['😀','😃','😄','😁','😆','😅','🤣','😂','🙂','🙃','😉','😊','😇','🥰','😍','🤩','😘','😋','😛','🤪','🤗','🤭','🤔','😏','😌','😴','🥱','😷','🤒','🥵','🥶','🥳','😎','🤓','🧐','😮','😲','🥺','😢','😭','😱','😤','😡','🤯','😈','🤡','👻','😺','😻'] },
    { label: '手勢', items: ['👍','👎','👌','✌️','🤞','🤟','🤘','🤙','👈','👉','👆','👇','☝️','✋','🖐️','👋','🤝','🙏','💪','✊','👊','👏','🙌','👐'] },
    { label: '愛心', items: ['❤️','🧡','💛','💚','💙','💜','🖤','🤍','🤎','💕','💞','💓','💗','💖','💘','💝','💟','♥️','💌','💔'] },
    { label: '慶祝 / 符號', items: ['✨','🔥','💯','⭐','🌟','💫','⚡','💥','🎉','🎊','🎁','🎈','🏆','🥇','🎯','🎀','🔔','💡','🌈','☀️','🌙','⏰','✅','❌','❗','❓','‼️','📌','📍','🔖','🏷️','💬','👀','📣','📢'] },
    { label: '動物', items: ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧','🐦','🦆','🦉','🐝','🦋','🐢','🐍','🐙','🦀'] },
    { label: '食物 / 飲料', items: ['🍎','🍊','🍋','🍌','🍉','🍇','🍓','🍒','🍑','🥭','🍍','🥝','🍅','🥑','🍞','🥐','🧀','🍳','🍔','🍕','🌭','🥪','🌮','🍜','🍱','🍣','🍰','🎂','🍦','🍩','🍪','☕','🍵','🧋','🍺','🍷'] },
    { label: '生活 / 物品', items: ['🛍️','💰','💵','📱','💻','📷','🎧','📚','✏️','📝','🎨','🎵','🎬','🚗','✈️','🏠','🌴','🏖️','⛰️','🌸','🌺','🌻','🌹','🍀','🌿'] }
  ];

  function renderEmojiGrid() {
    const grid = document.getElementById('emojiGrid');
    const frag = document.createDocumentFragment();
    EMOJI_GROUPS.forEach(group => {
      const label = document.createElement('span');
      label.className = 'emoji-cat';
      label.textContent = group.label;
      frag.appendChild(label);
      group.items.forEach(emoji => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'emoji-btn';
        btn.textContent = emoji;
        frag.appendChild(btn);
      });
    });
    grid.appendChild(frag);
  }
  renderEmojiGrid();

  document.getElementById('convertBtn').addEventListener('click', convert);

  let activeTextarea = document.getElementById('output');
  document.getElementById('input').addEventListener('focus', () => { activeTextarea = document.getElementById('input'); });
  document.getElementById('output').addEventListener('focus', () => { activeTextarea = document.getElementById('output'); });

  document.getElementById('emojiGrid').addEventListener('click', (e) => {
    const btn = e.target.closest('.emoji-btn');
    if (!btn) return;
    const el = activeTextarea;
    const start = el.selectionStart ?? el.value.length;
    const end = el.selectionEnd ?? el.value.length;
    el.value = el.value.slice(0, start) + btn.textContent + el.value.slice(end);
    const caret = start + btn.textContent.length;
    el.focus();
    el.setSelectionRange(caret, caret);
    el.dispatchEvent(new Event('input'));
  });

  document.getElementById('output').addEventListener('input', () => {
    document.getElementById('copyBtn').disabled = document.getElementById('output').value.length === 0;
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('input').value = '';
    document.getElementById('output').value = '';
    document.getElementById('copyBtn').disabled = true;
    document.getElementById('status').textContent = '';
    document.getElementById('socialHint').classList.remove('show');
    document.getElementById('input').focus();
  });

  document.getElementById('copyBtn').addEventListener('click', async () => {
    const output = document.getElementById('output');
    await navigator.clipboard.writeText(output.value);
    const status = document.getElementById('status');
    status.textContent = '已複製到剪貼簿';
    setTimeout(() => { status.textContent = ''; }, 2000);
  });
})();
</script>

</body>
</html>
